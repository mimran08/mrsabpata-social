name: Evening Post Mac (6pm Stockholm)

# Runs on the self-hosted Mac runner so X (browser) doesn't hang the way it does
# in CI WebKit + Xvfb. No schedule trigger — the Cloudflare Worker dispatches this.

on:
  workflow_dispatch:

jobs:
  post:
    name: Post to all platforms (Mac)
    runs-on: [self-hosted, macOS, mrsabpata]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium + WebKit, no --with-deps on Mac)
        run: npx playwright install webkit chromium

      - name: Restore platform sessions
        env:
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          YOUTUBE_SESSION: ${{ secrets.YOUTUBE_SESSION }}
          X_COOKIES: ${{ secrets.X_COOKIES }}
        run: |
          mkdir -p company
          echo "$INSTAGRAM_COOKIES" | base64 -d | gunzip > company/instagram-cookies.json
          echo "$TIKTOK_COOKIES"    | base64 -d | gunzip > company/tiktok-cookies.json
          echo "$YOUTUBE_COOKIES"   | base64 -d | gunzip > company/youtube-cookies.json
          echo "$YOUTUBE_SESSION"   | base64 -d | gunzip > company/youtube-session.json
          echo "$X_COOKIES"         | base64 -d | gunzip > company/x-cookies.json
          echo "Sessions restored."

      - name: Set today's date
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore done-state cache (prevents duplicate posts on re-run)
        id: done-cache
        uses: actions/cache/restore@v4
        with:
          path: company/daily-posts
          key: done-state-evening-mac-${{ steps.date.outputs.today }}-${{ github.run_number }}
          restore-keys: done-state-evening-mac-${{ steps.date.outputs.today }}-

      - name: Create .env.local
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          TIMEZONE: Europe/Stockholm
          CHANNEL_NAME: MrSabPata
          OWNER_NAME: Imran
        run: |
          python3 - << 'PYEOF'
          import os
          keys = [
            'GROQ_API_KEY','YOUTUBE_API_KEY','YOUTUBE_CHANNEL_ID',
            'YOUTUBE_CLIENT_ID','YOUTUBE_CLIENT_SECRET','YOUTUBE_REFRESH_TOKEN',
            'X_API_KEY','X_API_SECRET','X_ACCESS_TOKEN','X_ACCESS_TOKEN_SECRET','X_BEARER_TOKEN',
            'TIKTOK_CLIENT_KEY','TIKTOK_CLIENT_SECRET','TIKTOK_ACCESS_TOKEN',
            'INSTAGRAM_ACCESS_TOKEN','INSTAGRAM_BUSINESS_ACCOUNT_ID',
            'ELEVENLABS_API_KEY','TIMEZONE','CHANNEL_NAME','OWNER_NAME',
          ]
          with open('.env.local', 'w') as f:
            for k in keys:
              v = os.environ.get(k, '')
              if v:
                f.write(f'{k}={v}\n')
          print(f"Wrote {len(keys)} vars to .env.local")
          PYEOF

      - name: Create output directories
        run: mkdir -p company/daily-posts company/post-images company/post-videos logs

      - name: Run evening post
        env:
          # Persistent state dir (out of repo) — survives `git checkout` between cron
          # runs so news-dedup state actually accumulates across days
          MRSABPATA_STATE_DIR: /Users/imran/.mrsabpata-state
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: npx tsx --env-file=.env.local index.ts "post evening"

      - name: Save done-state cache (always — survives failed runs)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: company/daily-posts
          key: done-state-evening-mac-${{ steps.date.outputs.today }}-${{ github.run_number }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: evening-mac-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
